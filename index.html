<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Brawl Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- MAIN MENU -->
    <div id="mainMenu" class="screen active">
      <canvas class="menu-bg-canvas" id="menuBgCanvas"></canvas>
      <div class="menu-content">
        <div class="game-title">
          <span class="t1">BRAWL</span><br>
          <span class="t2">ARENA</span>
        </div>
        <div class="game-subtitle">CHOOSE YOUR FIGHTER</div>
        <button class="btn btn-primary" id="playBtn">⚔️ BATTLE!</button>
      </div>
    </div>

    <!-- CHARACTER SELECT -->
    <div id="charSelect" class="screen">
      <div class="section-title">SELECT BRAWLER</div>
      <div class="char-grid" id="charGrid"></div>
      <div class="char-info-panel" id="charInfo">
        <div style="color:#a0a0c0; text-align:center;">Tap a brawler to see stats</div>
      </div>
      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-danger btn-small" id="backCharBtn">← BACK</button>
        <button class="btn btn-primary btn-small" id="confirmCharBtn">SELECT →</button>
      </div>
    </div>

    <!-- MODE SELECT -->
    <div id="modeSelect" class="screen">
      <div class="section-title">SELECT MODE</div>
      <div class="mode-grid" id="modeGrid"></div>
      <button class="btn btn-danger btn-small" id="backModeBtn" style="margin-top:15px;">← BACK</button>
    </div>

    <!-- GAME -->
    <div id="gameScreen">
      <canvas id="gameCanvas"></canvas>
      <div class="hud" id="gameHUD">
        <div class="hud-top">
          <div class="hud-top-item" id="hudTimer">2:00</div>
          <div class="hud-top-item" id="hudAlive">👥 10</div>
          <div class="hud-top-item" id="hudMode">SHOWDOWN</div>
        </div>
        <div class="hud-bottom-left">
          <div class="hud-hp-bar-bg"><div class="hud-hp-bar" id="hudHpBar" style="width:100%"></div></div>
          <div class="hud-super-bar-bg"><div class="hud-super-bar" id="hudSuperBar" style="width:0%"></div></div>
          <div class="hud-ammo" id="hudAmmo"></div>
        </div>
        <div class="hud-bottom-right">
          <canvas class="minimap-canvas" id="minimapCanvas" width="100" height="75"></canvas>
        </div>
        <div class="hud-kill-feed" id="killFeed"></div>
        <!-- Touch joystick zones -->
        <div class="joystick-area joystick-left" id="joystickLeft"></div>
        <div class="joystick-area joystick-right" id="joystickRight"></div>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameOver" class="screen">
      <div class="result-container">
        <div class="result-title" id="resultTitle">VICTORY!</div>
        <div class="result-stats" id="resultStats"></div>
        <div class="btn-row">
          <button class="btn btn-danger btn-small" id="menuBtn">🏠 MENU</button>
          <button class="btn btn-primary btn-small" id="retryBtn">🔄 AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
